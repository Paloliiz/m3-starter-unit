<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <style>
        /* ================= ตกแต่งหน้าตาเว็บ (CSS) ================= */
        :root {
            --primary-color: #4A90E2; /* สีฟ้าหลัก */
            --secondary-color: #F5A623; /* สีส้มปุ่มกด */
            --bg-color: #F0F4F8; /* สีพื้นหลัง */
            --card-bg: #FFFFFF;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            margin: 20px;
            box-sizing: border-box;
        }

        /* ซ่อนหน้าจอที่เรายังไม่อยากให้เห็น */
        .hidden {
            display: none !important;
        }

        /* ส่วนหัวของข้อสอบ */
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .header p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        /* หน้า Login */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #357ABD;
        }

        .btn-warning {
            background-color: var(--secondary-color);
        }
        
        .btn-warning:hover {
            background-color: #E09612;
        }

        /* หน้าข้อสอบ */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 20px;
            background-color: #eef2f5;
            padding: 10px;
            border-radius: 8px;
        }

        .timer-warning {
            color: red;
        }

        .question-box {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #f9f9f9;
            color: var(--text-color);
            border: 2px solid #ddd;
            text-align: left;
            font-weight: normal;
        }

        .option-btn:hover {
            background-color: #eef2f5;
            border-color: var(--primary-color);
        }

        .option-btn.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* หน้าประกาศผล */
        .result-box {
            text-align: center;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .result-details {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>

// =========================================================

// =========================================================
function checkLogin() {
    const input = document.getElementById("student-id").value.trim();
    if (input.length !== 5) {
        alert("กรุณากรอกรหัสนักเรียน 5 หลักให้ครบถ้วน");
        return;
    }
    
    if (studentDB[input]) {
        currentStudent = studentDB[input];
        currentStudentId = input;
        document.getElementById("student-name-display").innerText = `${currentStudent.name} (${currentStudent.room} เลขที่ ${currentStudent.number})`;
        document.getElementById("confirm-box").classList.remove("hidden");
        document.getElementById("btn-login").classList.add("hidden");

        // เช็คว่าเป็นโหมดครูหรือไม่ ถ้าใช่ให้โชว์ปุ่มสีแดง
        if (input === "99999") {
            document.getElementById("btn-teacher-reset").classList.remove("hidden");
        } else {
            document.getElementById("btn-teacher-reset").classList.add("hidden");
        }

    } else {
        alert("ไม่พบรหัสนักเรียนนี้ในระบบ กรุณาตรวจสอบอีกครั้ง");
    }
}

// ฟังก์ชันพิเศษสำหรับครู (เคลียร์ความจำเบราว์เซอร์)
function resetTeacher() {
    localStorage.removeItem('M3_Unit0_Attempts_99999');
    alert("ล้างประวัติการสอบของครูเรียบร้อยแล้ว! ตอนนี้กดเริ่มทำข้อสอบเพื่อทดสอบเป็น 'รอบที่ 1' ได้เลยครับ");
}

function resetLogin() {
    document.getElementById("student-id").value = "";
    document.getElementById("confirm-box").classList.add("hidden");
    document.getElementById("btn-login").classList.remove("hidden");
    currentStudent = null;
    currentStudentId = null;
}

// =========================================================
// 6. เริ่มทำข้อสอบ
// =========================================================
function startExam() {
    // โหลดประวัติการสอบ (ถ้าเคยสอบแล้ว)
    let savedAttempt = localStorage.getItem('M3_Unit0_Attempts_' + currentStudentId);
    if (savedAttempt) {
        attemptCount = parseInt(savedAttempt) + 1;
    } else {
        attemptCount = 1;
    }

    // สุ่มข้อสอบและตัวเลือก
    quizPool = shuffleArray([...rawQuestions]).map(q => {
        let shuffledOptions = shuffleArray([...q.options]);
        return { ...q, options: shuffledOptions };
    });

    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
    
    // เริ่มระบบกันทุจริต
    enableAntiCheat();
    
    // เริ่มจับเวลา
    startTimer();
    
    // โหลดข้อแรก
    loadQuestion();
}

function loadQuestion() {
    if (currentQIndex >= quizPool.length) {
        finishExam();
        return;
    }

    let qData = quizPool[currentQIndex];
    document.getElementById("question-counter").innerText = `ข้อที่: ${currentQIndex + 1} / 30`;
    document.getElementById("question-text").innerText = qData.q;
    
    let optionsHtml = "";
    qData.options.forEach((opt, idx) => {
        // แก้ไขตรงนี้: ส่งค่า idx (ตัวเลข) ไปแทนตัวข้อความ เพื่อเลี่ยงปัญหาเครื่องหมาย '
        optionsHtml += `<button class="option-btn" onclick="selectOption(this, ${idx})">${opt}</button>`;
    });
    
    document.getElementById("options-area").innerHTML = optionsHtml;
    document.getElementById("btn-next").disabled = true;
}

// แก้ไขตรงนี้: รับค่าตัวเลข (selectedIndex) เข้ามาแทน
function selectOption(btnElement, selectedIndex) {
    let allBtns = document.querySelectorAll(".option-btn");
    allBtns.forEach(btn => btn.classList.remove("selected"));
    btnElement.classList.add("selected");
    
    // ดึงข้อความคำตอบที่แท้จริงจากฐานข้อมูลมาเก็บไว้
    userAnswers[currentQIndex] = quizPool[currentQIndex].options[selectedIndex];
    document.getElementById("btn-next").disabled = false;
}
function nextQuestion() {
    currentQIndex++;
    loadQuestion();
}

// =========================================================
// 7. ระบบจับเวลา
// =========================================================
function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        let s = (timeLeft % 60).toString().padStart(2, '0');
        let tDisplay = document.getElementById("time-display");
        tDisplay.innerText = `เวลา: ${m}:${s}`;
        
        if (timeLeft <= 300) tDisplay.classList.add("timer-warning"); // เตือน 5 นาทีสุดท้าย
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("หมดเวลาทำข้อสอบ! ระบบจะส่งคำตอบอัตโนมัติ");
            finishExam();
        }
    }, 1000);
}

// =========================================================
// 8. ประมวลผลและคิดคะแนน (Decay Multiplier)
// =========================================================
function finishExam() {
    clearInterval(timerInterval);
    disableAntiCheat();
    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("result-screen").classList.remove("hidden");

    // ตรวจคำตอบ
    score = 0;
    quizPool.forEach((q, idx) => {
        if (userAnswers[idx] === q.a) score++;
    });

    document.getElementById("final-score").innerText = score;
    document.getElementById("res-name").innerText = `${currentStudent.name}`;
    document.getElementById("res-attempt").innerText = attemptCount;

    let actionsHtml = "";
    
    // เกณฑ์ผ่าน 21/30 (70%)
    if (score >= 21) {
        document.getElementById("result-title").innerText = "🎉 ยินดีด้วย! นักเรียนสอบผ่าน";
        document.getElementById("result-title").style.color = "green";
        
        // คำนวณคะแนนสุทธิตามรอบ
        let netScore = score;
        let decayMsg = "";
        
        if (attemptCount === 2) {
            netScore = Math.round(score * 0.9);
            decayMsg = "สอบผ่านในรอบที่ 2 (รับคะแนน 90%)";
        } else if (attemptCount === 3) {
            netScore = Math.round(score * 0.8);
            decayMsg = "สอบผ่านในรอบที่ 3 (รับคะแนน 80%)";
        } else if (attemptCount >= 4) {
            netScore = 21; // Lock at pass minimum
            decayMsg = "สอบผ่านในรอบที่ 4 ขึ้นไป (รับคะแนนผ่านเกณฑ์ขั้นต่ำ)";
        } else {
            decayMsg = "สอบผ่านในรอบที่ 1 (รับคะแนนเต็ม 100%)";
        }

        document.getElementById("decay-warning").innerText = decayMsg;
        
        actionsHtml = `<button onclick="submitToGoogleSheets(${score}, ${netScore})">ส่งคะแนนบันทึกเข้าระบบ ➔</button>`;
        
    } else {
        document.getElementById("result-title").innerText = "❌ ยังไม่ผ่านเกณฑ์ พยายามเข้านะ!";
        document.getElementById("result-title").style.color = "red";
        
        // เซฟจำนวนรอบลงเครื่อง แต่ยังไม่ส่งคะแนน
        localStorage.setItem('M3_Unit0_Attempts_' + currentStudentId, attemptCount);
        
        actionsHtml = `<button class="btn-warning" onclick="location.reload()">ทบทวนเนื้อหา แล้วทำข้อสอบอีกครั้ง</button>`;
    }
    
    document.getElementById("action-buttons").innerHTML = actionsHtml;
}

// =========================================================
// 9. ส่งข้อมูลเข้า Google Sheets
// =========================================================
function submitToGoogleSheets(raw, net) {
    if (APP_SCRIPT_URL === "YOUR_GOOGLE_SCRIPT_URL_HERE") {
        alert("ครูพลอยอย่าลืมใส่ URL ของ Google Apps Script ในโค้ดบรรทัดที่ 4 นะครับ!");
        return;
    }

    const submitBtn = document.querySelector("#action-buttons button");
    submitBtn.innerText = "กำลังบันทึกข้อมูล...";
    submitBtn.disabled = true;

    const payload = {
        studentId: currentStudentId,
        name: currentStudent.name,
        room: currentStudent.room,
        number: currentStudent.number,
        rawScore: raw,
        attempt: attemptCount,
        netScore: net
    };

    fetch(APP_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("action-buttons").classList.add("hidden");
        document.getElementById("submit-status").innerText = "บันทึกคะแนนเข้าระบบเรียบร้อยแล้ว!";
        document.getElementById("submit-status").classList.remove("hidden");
        // ล้างความจำประวัติการสอบของคนนี้ เมื่อสอบผ่านแล้ว
        localStorage.removeItem('M3_Unit0_Attempts_' + currentStudentId);
    })
    .catch(err => {
        alert("เกิดข้อผิดพลาดในการส่งคะแนน โปรดตรวจสอบอินเทอร์เน็ตแล้วลองกดส่งใหม่");
        submitBtn.innerText = "ส่งคะแนนบันทึกเข้าระบบ ➔";
        submitBtn.disabled = false;
    });
}

// =========================================================
// 10. ฟังก์ชันเสริม: สุ่มข้อมูล (Fisher-Yates Shuffle)
// =========================================================
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// =========================================================
// 11. ระบบป้องกันการทุจริต (Anti-Cheat)
// =========================================================
function handleVisibilityChange() {
    if (document.hidden && !document.getElementById("quiz-screen").classList.contains("hidden")) {
        cheatWarnings++;
        if (cheatWarnings >= 3) {
            alert("คุณสลับหน้าจอเกินกำหนด! ระบบทำการบังคับส่งข้อสอบทันที");
            finishExam();
        } else {
            alert(`คำเตือนการสลับหน้าจอ! (${cheatWarnings}/3) ห้ามสลับหน้าจอไปที่อื่นขณะทำข้อสอบ`);
        }
    }
}

function disableRightClick(e) { e.preventDefault(); }

function enableAntiCheat() {
    document.addEventListener("visibilitychange", handleVisibilityChange);
    document.addEventListener("contextmenu", disableRightClick);
    document.addEventListener("selectstart", disableRightClick); // ห้ามคลุมดำ
}

function disableAntiCheat() {
    document.removeEventListener("visibilitychange", handleVisibilityChange);
    document.removeEventListener("contextmenu", disableRightClick);
    document.removeEventListener("selectstart", disableRightClick);
}
    </script>
